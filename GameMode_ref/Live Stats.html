<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ActivSpot — Game Mode · Live Stats</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body { font-family:'JetBrains Mono',monospace; background:#0a0a14; color:#cdd6f4; -webkit-font-smoothing:antialiased; }
#root { height:100%; }

@keyframes hud-blink  { 0%,100%{opacity:1} 50%{opacity:.2} }
@keyframes ring-pulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.06);opacity:1} }
@keyframes flash-in   { 0%{opacity:0} 14%{opacity:1} 86%{opacity:1} 100%{opacity:0} }
@keyframes stagger-up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
@keyframes slide-left { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:none} }
@keyframes slide-right{ from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:none} }
@keyframes tab-in     { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
@keyframes pill-open  { from{opacity:0;transform:scaleX(.6) scaleY(.5)} to{opacity:1;transform:none} }

.stagger { animation: stagger-up 360ms cubic-bezier(.16,1,.3,1) both; }
.slide-l  { animation: slide-left  320ms cubic-bezier(.16,1,.3,1) both; }
.slide-r  { animation: slide-right 320ms cubic-bezier(.16,1,.3,1) both; }
.tab-in   { animation: tab-in 280ms cubic-bezier(.16,1,.3,1) both; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ── tokens ──────────────────────────────────────────────────── */
const C = {
  base:'#1e1e2e', mantle:'#181825', crust:'#11111b',
  sv:'#252535', s0:'#313244', s1:'#45475a', s2:'#585b70',
  ov0:'#6c7086', ov1:'#7f849c',
  text:'#cdd6f4', sub1:'#bac2de', sub0:'#a6adc8',
  mauve:'#cba6f7', blue:'#89b4fa', teal:'#94e2d5',
  green:'#a6e3a1', peach:'#fab387', red:'#f38ba8',
  yellow:'#f9e2af', pink:'#f5c2e7',
  border:'rgba(205,214,244,0.07)',
};
function a(hex, op) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${op})`;
}

/* ── live stats ─────────────────────────────────────────────── */
const HIST = 44;
function mk(v,lo,hi,d){ return Math.round(Math.max(lo,Math.min(hi,v+(Math.random()-.47)*d))); }

function useStats() {
  const init = {fps:144,ping:12,gpu:76,cpu:38,ram:61,temp:70,vram:64,net:2.1};
  const [s, setS] = useState(init);
  const refs = {
    fps:  useRef(Array(HIST).fill(init.fps)),
    ping: useRef(Array(HIST).fill(init.ping)),
    gpu:  useRef(Array(HIST).fill(init.gpu)),
    cpu:  useRef(Array(HIST).fill(init.cpu)),
    temp: useRef(Array(HIST).fill(init.temp)),
    net:  useRef(Array(HIST).fill(init.net*10)),
    ram:  useRef(Array(HIST).fill(init.ram)),
  };
  useEffect(()=>{
    const iv = setInterval(()=>{
      setS(s=>{
        const fps =mk(s.fps,55,165,11); const ping=mk(s.ping,7,50,5);
        const gpu =mk(s.gpu,44,99,7);  const cpu =mk(s.cpu,16,94,6);
        const ram =mk(s.ram,42,88,2);  const temp=mk(s.temp,56,88,2);
        const vram=mk(s.vram,36,96,5);
        const net =Math.round(Math.max(.2,Math.min(10,s.net+(Math.random()-.5)*1.4))*10)/10;
        refs.fps.current  =[...refs.fps.current.slice(1),fps];
        refs.ping.current =[...refs.ping.current.slice(1),ping];
        refs.gpu.current  =[...refs.gpu.current.slice(1),gpu];
        refs.cpu.current  =[...refs.cpu.current.slice(1),cpu];
        refs.temp.current =[...refs.temp.current.slice(1),temp];
        refs.net.current  =[...refs.net.current.slice(1),Math.round(net*10)];
        refs.ram.current  =[...refs.ram.current.slice(1),ram];
        return {fps,ping,gpu,cpu,ram,temp,vram,net};
      });
    }, 900);
    return()=>clearInterval(iv);
  },[]);
  return {s, h:refs};
}

function health(fps,ping){
  if(fps>100&&ping<22) return {k:'good', c:C.green,  l:'OPTIMAL'};
  if(fps>60 &&ping<45) return {k:'ok',   c:C.yellow, l:'DEGRADED'};
  return                      {k:'bad',  c:C.red,    l:'CRITICAL'};
}

function histStats(arr){ const v=[...arr]; return {min:Math.min(...v),max:Math.max(...v),avg:Math.round(v.reduce((a,b)=>a+b,0)/v.length)}; }

/* ── NBox ───────────────────────────────────────────────────── */
function NBox({children,style={},pad=12,accent}){
  return (
    <div style={{
      background:a(C.sv,.84), borderRadius:12,
      border:`1px solid ${accent?a(accent,.2):C.border}`,
      padding:pad, boxShadow:accent?`0 0 0 1px ${a(accent,.06)}`:'none',
      ...style,
    }}>{children}</div>
  );
}

/* ── NCircleStat — arc 150°→390°, gap bottom ────────────────── */
function NCircleStat({value,max=100,unit='%',label,color,size=64,stroke=5,onClick,selected,animDelay=0}){
  const canRef=useRef();
  useEffect(()=>{
    const c=canRef.current; if(!c) return;
    const dpr=window.devicePixelRatio||1;
    const S=size*dpr;
    c.width=S; c.height=S; c.style.width=size+'px'; c.style.height=size+'px';
    const ctx=c.getContext('2d'); ctx.scale(dpr,dpr);
    const cx=size/2, cy=size/2, r=size/2-stroke-3;
    const start=Math.PI*5/6, end=Math.PI*13/6;
    ctx.clearRect(0,0,size,size);
    ctx.lineWidth=stroke; ctx.lineCap='round';
    ctx.strokeStyle=C.s0; ctx.beginPath(); ctx.arc(cx,cy,r,start,end); ctx.stroke();
    const ratio=Math.min(1,Math.max(0,value/max));
    if(ratio>.005){
      ctx.strokeStyle=color;
      ctx.beginPath(); ctx.arc(cx,cy,r,start,start+(end-start)*ratio); ctx.stroke();
    }
  },[value,color,size,stroke,max]);

  return (
    <div className="stagger" onClick={onClick} style={{
      display:'flex',flexDirection:'column',alignItems:'center',gap:3,
      cursor:onClick?'pointer':'default',
      animationDelay:`${animDelay}ms`,
    }}>
      <div style={{
        position:'relative',width:size,height:size,
        borderRadius:'50%',
        background:selected?a(color,.08):'transparent',
        border:selected?`1px solid ${a(color,.3)}`:'1px solid transparent',
        transition:'background 200ms, border-color 200ms',
        padding:2,
      }}>
        <canvas ref={canRef} style={{imageRendering:'crisp-edges'}}/>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',paddingBottom:10}}>
          <span style={{fontSize:12,fontWeight:900,color,letterSpacing:'-0.02em',lineHeight:1}}>
            {Math.round(value)}<span style={{fontSize:7,color:a(color,.7),marginLeft:.5}}>{unit}</span>
          </span>
        </div>
        {/* gap-bottom icon */}
        <div style={{position:'absolute',bottom:4,left:'50%',transform:'translateX(-50%)',
          fontSize:8,color:a(color,.55),letterSpacing:'0.06em',fontWeight:900,whiteSpace:'nowrap'}}>
          {label}
        </div>
      </div>
      {onClick && (
        <div style={{width:3,height:3,borderRadius:'50%',
          background:selected?color:a(C.ov0,.4),transition:'background 200ms'}}/>
      )}
    </div>
  );
}

/* ── NGraph (scrolling, fill) ───────────────────────────────── */
function NGraph({values,values2=[],color,color2=C.blue,max=100,max2=100,height=48,interval=900}){
  const ref=useRef(); const tRef=useRef(1); const rafRef=useRef();
  const v1=useRef(values), v2=useRef(values2);
  v1.current=values; v2.current=values2;

  function draw(t){
    const c=ref.current; if(!c) return;
    const dpr=window.devicePixelRatio||1;
    const W=c.clientWidth, H=c.clientHeight;
    c.width=W*dpr; c.height=H*dpr;
    const ctx=c.getContext('2d'); ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);

    const drawSeries=(vals,col,mx)=>{
      if(vals.length<2) return;
      const n=vals.length, pad=H*.1;
      const toX=(i)=>((i-n+n*t)/(n-1))*W;
      const toY=(v)=>H-pad-(Math.max(0,Math.min(1,v/mx)))*(H-pad*2);
      ctx.beginPath();
      vals.forEach((v,i)=>{ i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)); });
      ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.stroke();
      ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
      ctx.fillStyle=a(col,.12); ctx.fill();
    };
    drawSeries(v1.current,color,max);
    if(v2.current.length>1) drawSeries(v2.current,color2,max2);
  }

  useEffect(()=>{
    tRef.current=0; let start=null;
    function frame(ts){
      if(!start) start=ts;
      tRef.current=Math.min(1,(ts-start)/interval);
      draw(tRef.current);
      if(tRef.current<1) rafRef.current=requestAnimationFrame(frame);
    }
    cancelAnimationFrame(rafRef.current);
    rafRef.current=requestAnimationFrame(frame);
    return()=>cancelAnimationFrame(rafRef.current);
  },[values]);

  return <canvas ref={ref} style={{width:'100%',height,display:'block'}}/>;
}

/* ── Graph card (header + chart) ────────────────────────────── */
function GraphCard({title,value,unit,color,values,values2=[],color2,max=100,max2=100,height=52,animDelay=0,onClick}){
  const last=values[values.length-1]||0;
  const {min,avg,max:mx}=histStats(values);
  return (
    <div className="stagger" style={{animationDelay:`${animDelay}ms`}}
      onClick={onClick}>
      <NBox pad={10} accent={onClick?color:undefined}
        style={{cursor:onClick?'pointer':'default',transition:'border-color 200ms'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
          <span style={{fontSize:10,fontWeight:900,color,letterSpacing:'-0.01em',fontVariantNumeric:'tabular-nums'}}>
            {Math.round(value)}<span style={{fontSize:8,color:a(color,.6),marginLeft:1}}>{unit}</span>
          </span>
          {values2.length>0&&color2&&(
            <span style={{fontSize:10,fontWeight:900,color:color2}}>
              · {Math.round(values2[values2.length-1])}<span style={{fontSize:8,color:a(color2,.6)}}>{values2===undefined?'':unit}</span>
            </span>
          )}
          <span style={{fontSize:9,color:C.ov0,marginLeft:'auto',letterSpacing:'0.07em'}}>{title}</span>
        </div>
        <NGraph values={values} values2={values2} color={color} color2={color2||C.blue} max={max} max2={max2} height={height}/>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
          {[['min',min],[' avg',avg],['max',mx]].map(([l,v])=>(
            <span key={l} style={{fontSize:8,color:C.ov0}}>
              <span style={{color:C.ov1,marginRight:2}}>{l}</span>{v}
            </span>
          ))}
        </div>
      </NBox>
    </div>
  );
}

/* ── NToggle row ─────────────────────────────────────────────── */
function NToggle({icon,label,desc,on,onToggle,color=C.mauve,animDelay=0}){
  return (
    <div className="tab-in" onClick={onToggle}
      style={{
        animationDelay:`${animDelay}ms`,
        display:'flex',alignItems:'center',gap:12,padding:'8px 12px',
        background:on?a(color,.07):a(C.s0,.3),
        border:`1px solid ${on?a(color,.2):'rgba(205,214,244,0.05)'}`,
        borderRadius:12,cursor:'pointer',userSelect:'none',
        transition:'background 200ms,border-color 200ms',
      }}>
      <span style={{fontSize:14,color:on?color:C.ov0,transition:'color 200ms',width:18,textAlign:'center',flexShrink:0}}>{icon}</span>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:700,color:on?C.text:C.sub0,transition:'color 200ms',lineHeight:1.3}}>{label}</div>
        {desc&&<div style={{fontSize:9,color:C.ov0,marginTop:1,lineHeight:1.3}}>{desc}</div>}
      </div>
      <div style={{width:34,height:19,borderRadius:10,flexShrink:0,
        background:on?color:a(C.s1,.7),border:`1px solid ${on?a(color,.5):'rgba(205,214,244,0.1)'}`,
        position:'relative',transition:'background 200ms'}}>
        <div style={{position:'absolute',top:2.5,left:on?15:2.5,width:12,height:12,borderRadius:6,
          background:on?C.base:'white',transition:'left 200ms cubic-bezier(.16,1,.3,1)',
          boxShadow:'0 1px 3px rgba(0,0,0,.5)'}}/>
      </div>
    </div>
  );
}

/* ── Activation flash ────────────────────────────────────────── */
function Flash({color,onDone}){
  useEffect(()=>{ const t=setTimeout(onDone,950); return()=>clearTimeout(t); },[]);
  return (
    <div style={{position:'fixed',inset:0,zIndex:999,pointerEvents:'none',
      background:a(color,.05),animation:'flash-in 950ms ease both',
      display:'flex',alignItems:'center',justifyContent:'center'}}>
      <span style={{fontSize:10,fontWeight:900,color,letterSpacing:'0.3em',
        textShadow:`0 0 28px ${color}`,animation:'flash-in 950ms ease both'}}>GAME MODE ACTIVATED</span>
    </div>
  );
}

/* ── Detail drill-down view ──────────────────────────────────── */
function DetailView({metric,onBack}){
  const {s,h}=useStats();
  const METRICS={
    FPS:  {label:'FPS',  color:health(s.fps,s.ping).c, values:h.fps.current,  value:s.fps,  max:165, unit:''},
    PING: {label:'PING', color:s.ping<22?C.teal:C.yellow,values:h.ping.current,value:s.ping, max:60,  unit:'ms'},
    GPU:  {label:'GPU',  color:C.blue,  values:h.gpu.current,  value:s.gpu,  max:100, unit:'%'},
    CPU:  {label:'CPU',  color:C.mauve, values:h.cpu.current,  value:s.cpu,  max:100, unit:'%'},
    RAM:  {label:'RAM',  color:C.teal,  values:h.ram.current,  value:s.ram,  max:100, unit:'%'},
  };
  const m=METRICS[metric]||METRICS.FPS;
  const st=histStats(m.values);

  return (
    <div className="slide-l" style={{width:'100%',padding:'20px 22px'}}>
      {/* back */}
      <button onClick={onBack} style={{
        display:'flex',alignItems:'center',gap:6,
        background:'none',border:'none',color:C.ov0,fontSize:10,fontWeight:900,
        letterSpacing:'0.1em',cursor:'pointer',fontFamily:'inherit',
        marginBottom:16,padding:0,
      }}>← BACK</button>

      {/* big stat — hero number */}
      <div style={{display:'flex',alignItems:'center',gap:20,marginBottom:18}}>
        <div style={{
          width:88,height:88,borderRadius:16,flexShrink:0,
          background:a(m.color,.07),border:`1px solid ${a(m.color,.22)}`,
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,
          boxShadow:`0 0 24px ${a(m.color,.12)}`,
        }}>
          <span style={{fontSize:32,fontWeight:900,color:m.color,letterSpacing:'-0.05em',lineHeight:1,
            fontVariantNumeric:'tabular-nums'}}>{Math.round(m.value)}</span>
          {m.unit&&<span style={{fontSize:11,color:a(m.color,.6),fontWeight:700}}>{m.unit}</span>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:9,fontWeight:900,color:m.color,letterSpacing:'0.18em',marginBottom:8}}>{m.label} · LIVE</div>
          <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
            {[['MIN',st.min],['AVG',st.avg],['MAX',st.max]].map(([l,v])=>(
              <div key={l}>
                <div style={{fontSize:8,color:C.ov0,letterSpacing:'0.08em',marginBottom:3}}>{l}</div>
                <div style={{fontSize:16,fontWeight:900,color:C.sub1,letterSpacing:'-0.02em'}}>{v}{m.unit}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* large graph */}
      <NBox pad={10} accent={m.color}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:9,color:C.ov0,letterSpacing:'0.08em'}}>HISTORY · {HIST} SAMPLES</span>
          <span style={{fontSize:10,fontWeight:900,color:m.color}}>{Math.round(m.value)}{m.unit}</span>
        </div>
        <NGraph values={m.values} color={m.color} max={m.max} height={80}/>
      </NBox>

      {/* range bar */}
      <NBox pad={10} style={{marginTop:8}}>
        <div style={{fontSize:9,color:C.ov0,letterSpacing:'0.08em',marginBottom:8}}>RANGE</div>
        <div style={{position:'relative',height:6,background:C.s0,borderRadius:3,overflow:'hidden'}}>
          <div style={{
            position:'absolute',left:`${(st.min/m.max)*100}%`,
            width:`${((st.max-st.min)/m.max)*100}%`,
            height:'100%',background:a(m.color,.35),borderRadius:3,
          }}/>
          <div style={{
            position:'absolute',left:`${(Math.round(m.value)/m.max)*100}%`,
            width:3,height:'100%',background:m.color,
            transform:'translateX(-50%)',borderRadius:2,
            transition:'left 900ms cubic-bezier(.16,1,.3,1)',
          }}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
          <span style={{fontSize:8,color:C.ov0}}>{st.min}{m.unit} min</span>
          <span style={{fontSize:8,color:C.ov0}}>{st.max}{m.unit} max</span>
        </div>
      </NBox>
    </div>
  );
}

/* ── BigStat — большая цифра + мини-бар + label ─────────────── */
function BigStat({label,value,unit,color,max=100,onClick,animDelay=0}){
  const ratio=Math.min(1,value/max);
  return (
    <div className="stagger" onClick={onClick} style={{
      animationDelay:`${animDelay}ms`,
      flex:1, padding:'12px 10px', borderRadius:12, cursor:'pointer', userSelect:'none',
      background:a(color,.06),
      border:`1px solid ${a(color,.18)}`,
      display:'flex',flexDirection:'column',alignItems:'center',gap:6,
      transition:'background 200ms, border-color 200ms',
    }}
    onMouseEnter={e=>e.currentTarget.style.background=a(color,.11)}
    onMouseLeave={e=>e.currentTarget.style.background=a(color,.06)}
    >
      <span style={{fontSize:8,fontWeight:900,color:a(color,.7),letterSpacing:'0.14em'}}>{label}</span>
      <div style={{display:'flex',alignItems:'baseline',gap:2,lineHeight:1}}>
        <span style={{fontSize:26,fontWeight:900,color,letterSpacing:'-0.04em',
          transition:'color 400ms',fontVariantNumeric:'tabular-nums'}}>{Math.round(value)}</span>
        {unit&&<span style={{fontSize:10,color:a(color,.6),fontWeight:700}}>{unit}</span>}
      </div>
      {/* thin progress bar at bottom */}
      <div style={{width:'100%',height:2,background:C.s0,borderRadius:1,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${ratio*100}%`,background:color,borderRadius:1,
          transition:'width 900ms cubic-bezier(.16,1,.3,1)'}}/>
      </div>
    </div>
  );
}

/* ── OVERVIEW tab ────────────────────────────────────────────── */
function TabOverview({s,h,hc,onDrillDown}){
  return (
    <div style={{width:'100%',padding:'16px 22px'}}>

      {/* status badge */}
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12}}>
        <div style={{width:5,height:5,borderRadius:'50%',background:hc.c,
          animation:'hud-blink 1300ms ease infinite',flexShrink:0}}/>
        <span style={{fontSize:9,fontWeight:900,color:hc.c,letterSpacing:'0.16em'}}>{hc.l}</span>
        <span style={{fontSize:9,color:C.ov0,marginLeft:'auto',letterSpacing:'0.06em'}}>TAP TO DRILL DOWN</span>
      </div>

      {/* big numbers row */}
      <div style={{display:'flex',gap:6,marginBottom:10}}>
        <BigStat label="FPS"  value={s.fps}  unit=""    color={hc.c}                      max={165} onClick={()=>onDrillDown('FPS')}  animDelay={0}/>
        <BigStat label="PING" value={s.ping} unit="ms"  color={s.ping<22?C.teal:C.yellow} max={60}  onClick={()=>onDrillDown('PING')} animDelay={40}/>
        <BigStat label="GPU"  value={s.gpu}  unit="%"   color={C.blue}                    max={100} onClick={()=>onDrillDown('GPU')}  animDelay={80}/>
        <BigStat label="CPU"  value={s.cpu}  unit="%"   color={C.mauve}                   max={100} onClick={()=>onDrillDown('CPU')}  animDelay={120}/>
        <BigStat label="RAM"  value={s.ram}  unit="%"   color={C.teal}                    max={100} onClick={()=>onDrillDown('RAM')}  animDelay={160}/>
      </div>

      {/* secondary bars */}
      <NBox pad={10}>
        {[
          {l:'GPU TEMP', v:s.temp, max:90,  c:s.temp>80?C.peach:C.teal, u:`${s.temp}°C`},
          {l:'VRAM',     v:s.vram, max:100, c:C.blue,                    u:`${s.vram}%`},
          {l:'NET ↓',    v:Math.round(s.net*10), max:100, c:C.green,     u:`${s.net} MB/s`},
        ].map(({l,v,max,c,u},i)=>(
          <div key={l} className="tab-in" style={{
            animationDelay:`${i*40+200}ms`,
            display:'flex',alignItems:'center',gap:12,padding:'6px 0',
            borderBottom:i<2?'1px solid rgba(205,214,244,0.04)':'none',
          }}>
            <span style={{fontSize:9,color:C.ov0,width:66,flexShrink:0,letterSpacing:'0.06em'}}>{l}</span>
            <div style={{flex:1,height:3,background:C.s0,borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${(v/max)*100}%`,background:c,borderRadius:2,transition:'width 900ms cubic-bezier(.16,1,.3,1)'}}/>
            </div>
            <span style={{fontSize:10,fontWeight:700,color:c,width:56,textAlign:'right'}}>{u}</span>
          </div>
        ))}
      </NBox>
    </div>
  );
}

/* ── GRAPHS tab ──────────────────────────────────────────────── */
function TabGraphs({s,h,hc,onDrillDown}){
  return (
    <div style={{width:'100%',padding:'20px 22px',display:'flex',flexDirection:'column',gap:8}}>
      <GraphCard title="FPS" value={s.fps} unit="" color={hc.c}
        values={h.fps.current} max={165} height={48} animDelay={0}
        onClick={()=>onDrillDown('FPS')}/>
      <GraphCard title="CPU · TEMP" value={s.cpu} unit="%" color={C.mauve}
        values={h.cpu.current} values2={h.temp.current}
        color2={C.peach} max={100} max2={100} height={44} animDelay={60}/>
      <GraphCard title="GPU" value={s.gpu} unit="%" color={C.blue}
        values={h.gpu.current} max={100} height={44} animDelay={120}
        onClick={()=>onDrillDown('GPU')}/>
      <GraphCard title="PING" value={s.ping} unit="ms" color={s.ping<22?C.teal:C.yellow}
        values={h.ping.current} max={60} height={40} animDelay={180}
        onClick={()=>onDrillDown('PING')}/>
    </div>
  );
}

/* ── SETTINGS tab ────────────────────────────────────────────── */
function TabSettings(){
  const [perf, setPerf] = useState('balanced');
  const [dnd,  setDnd]  = useState(true);
  const [net,  setNet]  = useState(true);
  const [mic,  setMic]  = useState(false);
  const [stash,setStash]= useState(true);
  const [strm, setStrm] = useState(false);

  const modes=[
    {id:'saver',    label:'BATTERY',     color:C.green},
    {id:'balanced', label:'BALANCED',    color:C.mauve},
    {id:'perf',     label:'PERFORMANCE', color:C.red},
  ];

  return (
    <div style={{width:'100%',padding:'20px 22px',display:'flex',flexDirection:'column',gap:10}}>
      {/* perf mode */}
      <div className="tab-in" style={{animationDelay:'0ms'}}>
        <div style={{fontSize:9,fontWeight:900,color:C.ov1,letterSpacing:'0.16em',marginBottom:8}}>PERFORMANCE MODE</div>
        <div style={{display:'flex',gap:6}}>
          {modes.map(m=>(
            <div key={m.id} onClick={()=>setPerf(m.id)} style={{
              flex:1,height:34,borderRadius:10,
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,
              background:perf===m.id?a(m.color,.15):a(C.s0,.4),
              border:`1px solid ${perf===m.id?a(m.color,.45):'rgba(205,214,244,0.06)'}`,
              color:perf===m.id?m.color:C.ov0,fontSize:8,fontWeight:900,
              letterSpacing:'0.07em',cursor:'pointer',userSelect:'none',
              transition:'all 200ms',
              boxShadow:perf===m.id?`0 0 12px ${a(m.color,.18)}`:'none',
            }}>
              <div style={{width:5,height:5,borderRadius:'50%',
                background:perf===m.id?m.color:C.s1,
                boxShadow:perf===m.id?`0 0 6px ${m.color}`:'none',
                transition:'all 200ms',marginBottom:1}}/>
              {m.label}
            </div>
          ))}
        </div>
      </div>

      {/* focus */}
      <div className="tab-in" style={{animationDelay:'50ms'}}>
        <div style={{fontSize:9,fontWeight:900,color:C.ov1,letterSpacing:'0.16em',marginBottom:8}}>FOCUS</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <NToggle icon="🔕" label="Do Not Disturb"      desc="Block all notifications"   on={dnd}   onToggle={()=>setDnd(d=>!d)}   color={C.mauve}  animDelay={0}/>
          <NToggle icon="📥" label="Stash notifications" desc="Queue, don't interrupt"    on={stash} onToggle={()=>setStash(s=>!s)} color={C.blue}   animDelay={40}/>
          <NToggle icon="🎙" label="Mute microphone"     desc="Silence system mic"        on={mic}   onToggle={()=>setMic(m=>!m)}   color={C.red}    animDelay={80}/>
        </div>
      </div>

      {/* system */}
      <div className="tab-in" style={{animationDelay:'100ms'}}>
        <div style={{fontSize:9,fontWeight:900,color:C.ov1,letterSpacing:'0.16em',marginBottom:8}}>SYSTEM</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <NToggle icon="📶" label="Network priority"   desc="Prioritize game packets"   on={net}  onToggle={()=>setNet(n=>!n)}  color={C.teal}    animDelay={0}/>
          <NToggle icon="📡" label="Stream output"      desc="Enable NDI / OBS capture"  on={strm} onToggle={()=>setStrm(s=>!s)} color={C.yellow}  animDelay={40}/>
        </div>
      </div>
    </div>
  );
}

/* ── Island ──────────────────────────────────────────────────── */
function Island({children,width,height=36,expanded,onClick,borderColor,style={}}){
  return (
    <div onClick={onClick} style={{
      position:'relative',width,height,
      background:C.base,
      borderRadius:expanded?18:height/2,
      boxShadow:`0 14px 48px rgba(0,0,0,.56), 0 0 0 1px ${borderColor?a(borderColor,.18):C.border}`,
      display:'flex',alignItems:'center',justifyContent:'center',
      overflow:'hidden',cursor:onClick?'pointer':'default',
      transition:'all 520ms cubic-bezier(.16,1,.3,1), box-shadow 1200ms ease',
      ...style,
    }}>
      {borderColor&&expanded&&(
        <div style={{position:'absolute',top:0,left:'10%',right:'10%',height:1.5,
          background:`linear-gradient(90deg,transparent,${borderColor},transparent)`,zIndex:5,borderRadius:1}}/>
      )}
      {children}
    </div>
  );
}

/* ── Tab bar ─────────────────────────────────────────────────── */
function TabBar({active,onChange,hColor}){
  const tabs=[
    {id:'overview', label:'OVERVIEW'},
    {id:'graphs',   label:'GRAPHS'},
    {id:'settings', label:'SETTINGS'},
  ];
  return (
    <div style={{display:'flex',borderTop:`1px solid rgba(205,214,244,0.06)`,flexShrink:0}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={e=>{e.stopPropagation();onChange(t.id);}} style={{
          flex:1,height:32,background:'none',
          border:'none',borderBottom:`1.5px solid ${active===t.id?hColor:'transparent'}`,
          color:active===t.id?hColor:C.ov0,
          fontSize:8,fontWeight:900,letterSpacing:'0.12em',cursor:'pointer',fontFamily:'inherit',
          transition:'color 200ms, border-color 200ms',
        }}>{t.label}</button>
      ))}
    </div>
  );
}

/* ── Main game mode island ───────────────────────────────────── */
function GameIsland(){
  const {s,h}=useStats();
  const hc=health(s.fps,s.ping);
  const [open,  setOpen] = useState(false);
  const [flash, setFlash]= useState(false);
  const [tab,   setTab]  = useState('overview');
  const [drill, setDrill]= useState(null);     // metric key or null

  function handleOpen(){
    setFlash(true); setOpen(true); setTab('overview'); setDrill(null);
  }
  function handleTab(id){ setDrill(null); setTab(id); }

  const GAME='Metro Exodus Enhanced';

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
      {flash&&<Flash color={hc.c} onDone={()=>setFlash(false)}/>}

      <Island
        width={open?440:342} height={open?'auto':36} expanded={open}
        borderColor={hc.c}
        onClick={!open?handleOpen:undefined}
        style={open?{cursor:'default'}:{}}
      >
        {open ? (
          <div style={{width:'100%',display:'flex',flexDirection:'column'}}>

            {/* island header — always visible */}
            <div style={{padding:'14px 22px 0',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:hc.c,flexShrink:0,
                boxShadow:`0 0 8px ${hc.c}`,animation:'hud-blink 1300ms ease infinite'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:9,fontWeight:900,color:hc.c,letterSpacing:'0.16em',marginBottom:1}}>GAME MODE · LIVE</div>
                <div style={{fontSize:15,fontWeight:900,color:C.text,letterSpacing:'-0.02em',
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{GAME}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:8,color:C.ov0,marginBottom:1}}>SESSION</div>
                <Timer/>
              </div>
              <button onClick={e=>{e.stopPropagation();setOpen(false);}} style={{
                background:'none',border:'none',color:C.ov0,fontSize:12,cursor:'pointer',
                padding:'0 0 0 8px',lineHeight:1,flexShrink:0,
              }}>✕</button>
            </div>

            {/* content area */}
            {drill ? (
              <DetailView metric={drill} onBack={()=>setDrill(null)}/>
            ) : (
              <>
                {tab==='overview' && <TabOverview s={s} h={h} hc={hc} onDrillDown={setDrill}/>}
                {tab==='graphs'   && <TabGraphs   s={s} h={h} hc={hc} onDrillDown={setDrill}/>}
                {tab==='settings' && <TabSettings/>}
              </>
            )}

            {/* tab bar */}
            {!drill && <TabBar active={tab} onChange={handleTab} hColor={hc.c}/>}
          </div>
        ) : (
          /* ── collapsed ── */
          <div style={{display:'flex',alignItems:'center',gap:0,padding:'0 14px',height:'100%',userSelect:'none'}}>
            {/* health dot */}
            <div style={{width:6,height:6,borderRadius:'50%',background:hc.c,
              boxShadow:`0 0 7px ${a(hc.c,.7)}`,marginRight:10,
              animation:'hud-blink 1300ms ease infinite',flexShrink:0}}/>
            {/* game abbr */}
            <span style={{fontSize:9,fontWeight:900,color:C.ov0,letterSpacing:'0.1em',marginRight:10,flexShrink:0}}>
              {GAME.split(' ').map(w=>w[0]).join('').slice(0,3)}
            </span>
            <div style={{width:1,height:12,background:a(C.text,.08),marginRight:10,flexShrink:0}}/>
            {/* FPS */}
            <Chip val={s.fps} unit="" color={hc.c}/>
            <Divider/>
            {/* GPU */}
            <Chip val={s.gpu} unit="%" label="GPU" color={C.blue}/>
            <Divider/>
            {/* CPU */}
            <Chip val={s.cpu} unit="%" label="CPU" color={C.mauve}/>
          </div>
        )}
      </Island>
    </div>
  );
}

function Chip({val,unit,label,color}){
  return (
    <div style={{display:'flex',alignItems:'baseline',gap:2}}>
      {label&&<span style={{fontSize:8,color:C.ov0,marginRight:2}}>{label}</span>}
      <span style={{fontSize:13,fontWeight:900,color,letterSpacing:'-0.03em',transition:'color 400ms'}}>{Math.round(val)}</span>
      <span style={{fontSize:8,color:C.ov0}}>{unit}</span>
    </div>
  );
}
function Divider(){
  return <div style={{width:1,height:12,background:a(C.text,.08),margin:'0 9px',flexShrink:0}}/>;
}
function Timer(){
  const [t,setT]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>setT(x=>x+1),1000);return()=>clearInterval(iv);},[]);
  const h=String(Math.floor(t/3600)).padStart(2,'0');
  const m=String(Math.floor((t%3600)/60)).padStart(2,'0');
  const s2=String(t%60).padStart(2,'0');
  return <span style={{fontSize:12,fontWeight:700,color:C.sub1,letterSpacing:'0.02em'}}>{h}:{m}:{s2}</span>;
}

/* ── Wallpaper + chrome ─────────────────────────────────────── */
function Wallpaper({glow}){
  return (
    <div style={{position:'fixed',inset:0,zIndex:0,
      background:'radial-gradient(ellipse 80% 55% at 58% 48%,#12122a,transparent 65%),linear-gradient(155deg,#0d0d1e,#060614)'}}>
      <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice"
        style={{position:'absolute',bottom:0,left:0,width:'100%',height:'60%'}}>
        <polygon points="0,900 200,350 400,500 640,200 870,420 1060,145 1280,325 1440,240 1440,900" fill="rgba(8,8,22,.94)"/>
        <polygon points="0,900 160,465 360,580 540,300 740,460 960,215 1160,390 1380,275 1440,315 1440,900" fill="rgba(5,5,16,.97)"/>
      </svg>
      <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(circle,rgba(203,166,247,.04) 1px,transparent 1px)',backgroundSize:'30px 30px'}}/>
      {glow&&<div style={{position:'absolute',inset:0,background:`radial-gradient(ellipse 110% 35% at 50% 0%,${a(glow,.05)},transparent 60%)`,transition:'background 1.4s ease',pointerEvents:'none'}}/>}
    </div>
  );
}
function EdgeGlow({color}){
  return <div style={{position:'fixed',inset:0,zIndex:2,pointerEvents:'none',
    boxShadow:`inset 0 0 90px ${a(color,.07)}`,transition:'box-shadow 1.4s ease'}}/>;
}
function TopBar({glow}){
  const [t,setT]=useState('');
  useEffect(()=>{ const u=()=>setT(new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})); u();const iv=setInterval(u,1000);return()=>clearInterval(iv);},[]);
  return (
    <div style={{position:'fixed',top:0,left:0,right:0,height:46,zIndex:50,
      background:'rgba(10,10,20,.84)',backdropFilter:'blur(22px)',
      borderBottom:`1px solid ${glow?a(glow,.09):'rgba(205,214,244,0.04)'}`,
      display:'flex',alignItems:'center',padding:'0 24px',gap:12,transition:'border-color 1s'}}>
      {[1,2,3,4].map(n=>(
        <div key={n} style={{width:n===2?18:9,height:n===2?18:9,borderRadius:n===2?4:2,
          background:n===2?C.mauve:a(C.mauve,.18),
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:6,fontWeight:900,color:n===2?C.base:'transparent'}}>{n===2?'2':''}</div>
      ))}
      <div style={{flex:1}}/>
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'3px 10px',borderRadius:999,
        background:a(C.green,.07),border:`1px solid ${a(C.green,.22)}`}}>
        <div style={{width:5,height:5,borderRadius:'50%',background:C.green,animation:'hud-blink 1400ms ease infinite'}}/>
        <span style={{fontSize:8,fontWeight:900,color:C.green,letterSpacing:'0.12em'}}>GAME MODE</span>
      </div>
      <div style={{height:13,width:1,background:'rgba(205,214,244,0.07)'}}/>
      <span style={{fontSize:11,fontWeight:700,color:C.sub1}}>{t}</span>
    </div>
  );
}

/* ── App ────────────────────────────────────────────────────── */
function App(){
  const {s}=useStats();
  const hc=health(s.fps,s.ping);
  return (
    <div style={{position:'relative',width:'100%',height:'100%'}}>
      <Wallpaper glow={hc.c}/>
      <EdgeGlow color={hc.c}/>
      <TopBar glow={hc.c}/>
      <div style={{position:'relative',zIndex:10,height:'100%',display:'flex',
        alignItems:'center',justifyContent:'center',paddingTop:46}}>
        <GameIsland/>
      </div>
      {/* hint */}
      <div style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',
        fontSize:9,color:C.ov0,letterSpacing:'0.1em',background:a(C.mantle,.8),
        backdropFilter:'blur(8px)',padding:'4px 14px',borderRadius:999,
        border:'1px solid rgba(205,214,244,0.05)',whiteSpace:'nowrap',zIndex:100}}>
        CLICK TO EXPAND · TAP STATS FOR DRILL-DOWN
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
