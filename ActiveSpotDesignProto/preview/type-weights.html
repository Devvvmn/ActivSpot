<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--base); font-family: var(--font-mono); padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .label { width: 80px; font-size: 9px; color: var(--overlay0); text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; }
  .sample { font-size: 15px; color: var(--text); }
  .divider { height: 1px; background: rgba(205,214,244,0.05); }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Regular 400</div>
    <div class="sample" style="font-weight:400">JetBrains Mono — the quick brown fox</div>
  </div>
  <div class="row">
    <div class="label">Medium 500</div>
    <div class="sample" style="font-weight:500">JetBrains Mono — the quick brown fox</div>
  </div>
  <div class="row">
    <div class="label">Bold 700</div>
    <div class="sample" style="font-weight:700">JetBrains Mono — the quick brown fox</div>
  </div>
  <div class="row">
    <div class="label">Black 900</div>
    <div class="sample" style="font-weight:900">JetBrains Mono — the quick brown fox</div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="label">Icon font</div>
    <div class="sample" style="font-family:monospace;color:var(--mauve);font-size:18px">󰒮 󰏤 󰐊 󰒭 󰋗 󰕰 󰤨 󰂱 󰁹 󰂚 󰅖</div>
  </div>
</body>
</html>
