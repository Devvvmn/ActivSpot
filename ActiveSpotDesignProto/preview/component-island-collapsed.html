<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0c0c18; font-family: var(--font-mono); padding: 22px 20px; display: flex; flex-direction: column; gap: 18px; align-items: center; }
  .row-label { font-size: 9px; color: var(--overlay0); text-transform: uppercase; letter-spacing: 0.12em; align-self: flex-start; }
  .pill { background: #1e1e2e; border-radius: 9999px; display: inline-flex; align-items: center; box-shadow: 0 8px 28px rgba(0,0,0,0.45); height: 38px; }
  canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>

  <div class="row-label">Clock / Weather (default)</div>
  <div class="pill" style="gap:8px; padding:0 18px;">
    <span style="font-size:13px;font-weight:900;color:#cdd6f4;letter-spacing:-0.02em">11:17</span>
    <span style="font-size:10px;color:#a6adc8">Tue, Apr 07</span>
    <div style="width:1px;height:14px;background:rgba(205,214,244,0.1)"></div>
    <span style="font-size:19px;color:#cba6f7;line-height:1">☁</span>
    <span style="font-size:12px;font-weight:900;color:#fab387">4.9°C</span>
  </div>

  <div class="row-label">Music — playing</div>
  <div class="pill" style="gap:11px; padding:0 10px;">
    <div style="width:26px;height:26px;border-radius:7px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,#cba6f7,#89b4fa)"></div>
    <div style="display:flex;flex-direction:column;gap:1px">
      <span style="font-size:12px;font-weight:900;color:#cdd6f4;white-space:nowrap">I Don't Care</span>
      <span style="font-size:9px;color:#a6adc8;white-space:nowrap">VIOLENT VIRA</span>
    </div>
    <div style="display:flex;align-items:center;gap:2px">
      <div style="width:21px;height:21px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#a6adc8">&#9664;</div>
      <div style="width:25px;height:25px;border-radius:13px;background:rgba(203,166,247,0.15);display:flex;align-items:center;justify-content:center;font-size:11px;color:#cdd6f4">&#9646;&#9646;</div>
      <div style="width:21px;height:21px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#a6adc8">&#9654;</div>
    </div>
    <div style="display:flex;align-items:center;gap:2px;height:16px">
      <canvas id="cava1" width="3" height="16" style="width:3px;height:16px"></canvas>
      <canvas id="cava2" width="3" height="16" style="width:3px;height:16px"></canvas>
      <canvas id="cava3" width="3" height="16" style="width:3px;height:16px"></canvas>
      <canvas id="cava4" width="3" height="16" style="width:3px;height:16px"></canvas>
      <canvas id="cava5" width="3" height="16" style="width:3px;height:16px"></canvas>
      <canvas id="cava6" width="3" height="16" style="width:3px;height:16px"></canvas>
    </div>
    <canvas id="catMusic" width="24" height="24" style="width:24px;height:24px;flex-shrink:0"></canvas>
  </div>

  <div class="row-label">Notification — collapsed</div>
  <div class="pill" style="gap:11px; padding:0 12px 0 10px;">
    <div style="width:26px;height:26px;border-radius:7px;background:rgba(250,179,135,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <span style="font-size:13px;color:#fab387">&#9993;</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:1px">
      <span style="font-size:10px;font-weight:500;color:#fab387;white-space:nowrap">Discord</span>
      <span style="font-size:12px;font-weight:900;color:#cdd6f4;white-space:nowrap">New message in #general</span>
    </div>
    <canvas id="catNotif" width="24" height="24" style="width:24px;height:24px;flex-shrink:0"></canvas>
  </div>

  <div class="row-label">Screen recording</div>
  <div class="pill" style="gap:10px; padding:0 16px;">
    <div id="recDot" style="width:8px;height:8px;border-radius:4px;background:#f38ba8;flex-shrink:0"></div>
    <span style="font-size:12px;font-weight:900;color:#cdd6f4">REC</span>
    <span style="font-size:11px;color:#a6adc8" id="recTimer">00:00</span>
    <div style="width:1px;height:14px;background:rgba(205,214,244,0.1)"></div>
    <span style="font-size:10px;color:#a6adc8">Pause</span>
    <span style="font-size:10px;color:#f38ba8">Stop</span>
  </div>

</body>
<script>
// ── Cat sprite — 8×8, PS=3 ───────────────────────────────────────────────
// '#'=body  'E'=eye (dark)  'N'=nose (mauve)  ' '=transparent
// Redesigned for clearer cat silhouette: triangular ears, round head, visible paws

const B = '#cdd6f4'; // body
const E = '#1e1e2e'; // eye / pupil
const N = '#cba6f7'; // nose accent

const SPRITES = {
  sit: [
    "#      #",   // row 0: ear tips
    "##    ##",   // row 1: ears
    "########",   // row 2: head top
    "#E####E#",   // row 3: eyes
    "###NN###",   // row 4: nose
    " ###### ",   // row 5: cheeks / chin
    "  ####  ",   // row 6: chest
    "  #  #  "    // row 7: paws
  ],
  blink: [
    "#      #",
    "##    ##",
    "########",
    "#-####-#",   // closed eyes (dash = body color, just draw body)
    "###NN###",
    " ###### ",
    "  ####  ",
    "  #  #  "
  ],
  walkA: [
    "#      #",
    "##    ##",
    "########",
    "#E######",
    "###NN###",
    " ###### ",
    " ## ##  ",
    "  #  #  "
  ],
  walkB: [
    "#      #",
    "##    ##",
    "########",
    "#E######",
    "###NN###",
    " ###### ",
    "  ## ## ",
    "  #   # "
  ],
  alert: [
    "#      #",
    "##    ##",
    "########",
    "#EE##EE#",   // wide eyes
    "###NN###",
    " ###### ",
    "  ####  ",
    "  #  #  "
  ],
  sleep: [
    "        ",
    "#      #",
    "##    ##",
    "########",
    "########",
    " ###### ",
    " ###### ",
    "       #"
  ]
};

const SEQS = {
  idle:  ['sit','sit','sit','blink'],
  bop:   ['sit','blink','sit'],
  alert: ['alert','sit','alert','sit'],
  walk:  ['walkA','walkB'],
};

function drawCat(canvas, frameName) {
  const ctx = canvas.getContext('2d');
  const ps = canvas.width / 8;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const sprite = SPRITES[frameName];
  if (!sprite) return;
  for (let r = 0; r < sprite.length; r++) {
    for (let col = 0; col < sprite[r].length; col++) {
      const ch = sprite[r][col];
      if (ch === ' ' || ch === '-') continue;
      ctx.fillStyle = ch === 'E' ? E : ch === 'N' ? N : B;
      ctx.fillRect(col * ps, r * ps, ps, ps);
    }
  }
}

function animateCat(id, seqName, ms) {
  const c = document.getElementById(id);
  const seq = SEQS[seqName];
  let f = 0;
  drawCat(c, seq[0]);
  setInterval(() => { f = (f+1)%seq.length; drawCat(c, seq[f]); }, ms);
}

animateCat('catMusic', 'bop',   300);
animateCat('catNotif', 'alert', 220);

// ── CAVA bars — solid, center outward ────────────────────────────────────
const CAVA_COLORS = ['#89b4fa','#cba6f7','#f5c2e7','#fab387','#f5c2e7','#89b4fa'];
const cavaBars = [1,2,3,4,5,6].map(i => document.getElementById('cava'+i));
let ph = 0;
(function tick() {
  cavaBars.forEach((c, i) => {
    if (!c) return;
    const ctx = c.getContext('2d');
    const w = c.width, h = c.height;
    const v = 0.18 + 0.78 * Math.abs(Math.sin(ph * 0.08 + i * 1.1));
    const half = Math.max(1, Math.round(h/2 * v));
    const cy = h/2;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = CAVA_COLORS[i];
    ctx.beginPath(); ctx.roundRect(0, cy - half, w, half, 1); ctx.fill();
    ctx.beginPath(); ctx.roundRect(0, cy,        w, half, 1); ctx.fill();
  });
  ph++;
  requestAnimationFrame(tick);
})();

// ── REC dot blink ─────────────────────────────────────────────────────────
const recDot = document.getElementById('recDot');
const recTimer = document.getElementById('recTimer');
let secs = 0, vis = true;
setInterval(() => { vis = !vis; recDot.style.opacity = vis ? '1' : '0.12'; }, 620);
setInterval(() => {
  secs++;
  recTimer.textContent = String(Math.floor(secs/60)).padStart(2,'0') + ':' + String(secs%60).padStart(2,'0');
}, 1000);
</script>
</html>
